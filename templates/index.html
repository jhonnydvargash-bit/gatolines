<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoGebra Clone - Geometría</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background-color: #f5f5f5; }
        
        /* Contenedor Superior: Gráficos 3D */
        #canvas-container {
            flex: 1; /* Toma la mitad superior de la pantalla */
            background-color: #ffffff;
            position: relative;
            border-bottom: 2px solid #e0e0e0;
        }

        /* Instrucciones flotantes en la vista 3D */
        .overlay-text {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #888;
            font-size: 12px;
            pointer-events: none;
        }

        /* Contenedor Inferior: Álgebra y Entradas */
        #algebra-view {
            height: 45%; /* Toma la mitad inferior */
            background-color: #ffffff;
            overflow-y: auto;
            padding: 15px;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .icon {
            width: 24px; height: 24px;
            border-radius: 50%; border: 2px solid;
            margin-right: 15px;
        }

        .c-purple { border-color: #6a0dad; }
        .c-orange { border-color: #d2691e; }
        .c-green { border-color: #008000; }
        .c-gray { border-color: #555; }

        input[type="number"] {
            width: 60px; padding: 5px; margin-left: 10px;
            border: 1px solid #ccc; border-radius: 4px;
            font-size: 16px;
        }

        .formula {
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px; color: #333; margin-left: 10px;
            word-wrap: break-word; flex: 1;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <div class="overlay-text">Gira con 1 dedo. Haz zoom con 2 dedos.</div>
    </div>

    <div id="algebra-view">
        <div class="row">
            <div class="icon c-purple"></div>
            <span>a = </span><input type="number" id="input-a" value="40" oninput="updateGeometry()"> <span>cm</span>
        </div>
        <div class="row">
            <div class="icon c-orange"></div>
            <span>b = </span><input type="number" id="input-b" value="300" oninput="updateGeometry()"> <span>cm</span>
        </div>
        <div class="row">
            <div class="icon c-green"></div>
            <span>c = </span><input type="number" id="input-c" value="15" oninput="updateGeometry()"> <span>cm</span>
        </div>
        <div class="row">
            <div class="icon c-gray"></div>
            <div class="formula" id="text-area">A = 2ab + 2ac + 2bc = ...</div>
        </div>
        <div class="row">
            <div class="icon c-gray"></div>
            <div class="formula" id="text-volume">V = abc = ...</div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN DE THREE.JS ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        // Cámara
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(200, 150, 300);

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        container.appendChild(renderer.domElement);

        // Controles para móvil (táctil) y PC (mouse)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Geometría del prisma
        let mesh, edges;
        const material = new THREE.MeshBasicMaterial({ color: 0xf0f0f0, transparent: true, opacity: 0.8 });
        const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
        const group = new THREE.Group();
        scene.add(group);

        // Función para actualizar tamaño y fórmulas
        function updateGeometry() {
            const a = parseFloat(document.getElementById('input-a').value) || 0;
            const b = parseFloat(document.getElementById('input-b').value) || 0;
            const c = parseFloat(document.getElementById('input-c').value) || 0;

            // 1. Limpiar geometría anterior
            if(mesh) { group.remove(mesh); mesh.geometry.dispose(); }
            if(edges) { group.remove(edges); edges.geometry.dispose(); }

            // 2. Crear nueva geometría (dividimos por 2 para que encaje mejor en cámara)
            // Asignamos 'a' al ancho(x), 'c' a la altura(y), 'b' a la profundidad(z) para simular tu imagen
            const geometry = new THREE.BoxGeometry(a, c, b);
            mesh = new THREE.Mesh(geometry, material);
            
            // Crear bordes negros estilo GeoGebra
            const edgesGeometry = new THREE.EdgesGeometry(geometry);
            edges = new THREE.LineSegments(edgesGeometry, edgeMaterial);

            group.add(mesh);
            group.add(edges);

            // 3. Actualizar textos de Fórmulas
            const area = 2*(a*b) + 2*(a*c) + 2*(b*c);
            const volume = a * b * c;
            
            document.getElementById('text-area').innerText = 
                `A = 2ab + 2ac + 2bc = 2(${a})(${b}) + 2(${a})(${c}) + 2(${b})(${c}) = ${area} cm²`;
            
            document.getElementById('text-volume').innerText = 
                `V = abc = (${a})(${b})(${c}) = ${volume} cm³`;
        }

        // --- BUCLE DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necesario para la fluidez táctil
            renderer.render(scene, camera);
        }

        // Manejar cambio de orientación de pantalla (móvil)
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Inicializar
        updateGeometry();
        animate();
    </script>
</body>
</html>
